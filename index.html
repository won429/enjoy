<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Play Enjoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 폰트 및 아이콘 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Toss Style Design System 적용 */
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #000000;
            color: #FFFFFF;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            touch-action: pan-y;
            overflow: hidden;
        }

        /* 공통 유틸리티 */
        .text-main { color: #FFFFFF; }
        .text-sub { color: #9CA3AF; }
        .text-blue { color: #3182F6; }
        
        /* 토스 스타일 카드 (검정 배경용 다크 글래스) */
        .toss-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.1s;
        }
        .toss-card:active {
            transform: scale(0.98);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        }

        /* 스크롤바 숨김 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 애니메이션 */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Safe Area */
        .pt-safe { padding-top: max(20px, env(safe-area-inset-top)); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

        /* 가사 스타일 */
        .lyric-line {
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1), 
                        opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                        filter 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                        color 0.3s ease-in-out; 
            opacity: 0.4; 
            transform: scale(0.95) translateX(0);
            transform-origin: left center;
            filter: blur(0.5px); 
            font-size: 1.5rem;
            font-weight: 700;
            color: #6B7684; 
            margin-bottom: 2rem;
            line-height: 1.5;
            cursor: pointer;
            will-change: transform, opacity, filter, color;
            white-space: pre-wrap;       
            word-break: keep-all;        
            width: fit-content;
            max-width: 90%;             
        }
        .lyric-line.active {
            opacity: 1 !important;
            transform: scale(1.05) translateX(0); 
            filter: blur(0);
            color: #3182F6 !important; /* Toss Blue */
            text-shadow: 0 4px 12px rgba(49, 130, 246, 0.1);
        }
        .lyrics-mask {
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }
        
        /* 가사 오버레이 상태 클래스 */
        .lyrics-closed { transform: translateY(100%); }
        .lyrics-open { transform: translateY(0); }

        /* 다이나믹 아일랜드 & 미니 플레이어 스타일 (불투명) */
        .dynamic-glass {
            background: #1C1C1E; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); 
        }

        /* Range Slider Customization */
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; box-shadow: none; border: none; }
        
        /* 랭킹 뱃지 스타일 */
        .rank-badge-new { color: #EAB308; font-size: 8px; font-weight: 800; }
        .rank-badge-up { color: #F04452; font-size: 10px; font-weight: 800; }
        .rank-badge-down { color: #3182F6; font-size: 10px; font-weight: 800; }
        
        /* 메뉴 활성화 상태 스타일 */
        .nav-active { color: #FFFFFF !important; }
        .nav-inactive { color: #6B7684 !important; }
    </style>
</head>
<body class="h-[100dvh] w-screen fixed bg-black">

    <!-- 메인 컨테이너 -->
    <main class="w-full h-full relative bg-black overflow-hidden">

        <!-- Coming Soon 팝업 -->
        <div id="popup-modal" class="absolute inset-0 z-[70] bg-black/50 backdrop-blur-md hidden flex items-center justify-center px-6 transition-all duration-300">
            <div class="bg-[#1C1C1E]/80 backdrop-blur-2xl rounded-[32px] p-8 w-full max-w-[300px] text-center shadow-[0_16px_40px_rgba(0,0,0,0.5)] scale-in border border-white/10 relative overflow-hidden">
                <!-- 은은한 상단 라이팅 효과 -->
                <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-[160px] h-[160px] bg-[#3182F6]/30 blur-[50px] rounded-full pointer-events-none"></div>
                
                <div class="relative z-10">
                    <div class="w-16 h-16 bg-white/5 rounded-[20px] flex items-center justify-center mx-auto mb-5 border border-white/10 shadow-inner">
                        <i class="fa-solid fa-lock text-2xl text-white/90"></i>
                    </div>
                    <h3 class="text-[22px] font-bold text-white mb-2 tracking-tight">Coming Soon</h3>
                    <p class="text-[#9CA3AF] text-[13px] mb-8 leading-relaxed font-medium break-keep">아직 공개되지 않은 트랙입니다.<br>조금만 더 기다려주세요!</p>
                    <button id="popup-close" class="w-full bg-[#3182F6] text-[15px] text-white font-bold py-3.5 rounded-[18px] hover:bg-[#2563EB] active:scale-[0.97] transition-all">확인</button>
                </div>
            </div>
        </div>

        <!-- 아티스트 노래 목록 모달 -->
        <div id="artist-modal" class="absolute inset-0 z-[80] bg-black/60 backdrop-blur-md hidden flex items-end justify-center transition-opacity duration-300">
            <div class="bg-[#1C1C1E]/90 backdrop-blur-2xl w-full rounded-t-[32px] p-6 pb-10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] transform transition-transform duration-300 translate-y-full border-t border-white/10 relative overflow-hidden" id="artist-modal-content">
                <!-- 앰비언트 라이트 효과 -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[200px] h-[100px] bg-[#3182F6]/20 blur-[50px] rounded-full pointer-events-none"></div>

                <div class="w-10 h-1.5 bg-white/20 rounded-full mx-auto mb-8"></div>
                
                <div class="flex items-center gap-5 mb-8 relative z-10 px-2">
                    <div class="w-[72px] h-[72px] rounded-full overflow-hidden shadow-lg border-2 border-white/10 flex items-center justify-center bg-[#111111] relative shrink-0">
                        <i id="artist-modal-icon" class="fa-solid fa-user text-3xl text-gray-500 absolute"></i>
                        <img id="artist-modal-img" src="" class="w-full h-full object-cover absolute hidden">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 id="artist-modal-name" class="text-[28px] font-black text-white tracking-tight leading-none mb-1.5 truncate">Artist Name</h3>
                        <p class="text-[12px] text-[#3182F6] font-bold tracking-widest uppercase">Artist Tracks</p>
                    </div>
                </div>
                
                <div id="artist-song-list" class="flex flex-col gap-2 max-h-[50vh] overflow-y-auto scrollbar-hide px-1 relative z-10 pb-4"></div>
                
                <button id="artist-modal-close" class="w-full bg-white/[0.08] border border-white/[0.05] text-[15px] text-white font-bold py-4 rounded-[20px] mt-2 hover:bg-white/10 transition-all active:scale-[0.98] relative z-10">닫기</button>
            </div>
        </div>

        <!-- 관리자 로그인 모달 -->
        <div id="admin-login-modal" class="absolute inset-0 z-[90] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-6">
            <div class="bg-[#1C1C1E] rounded-[24px] p-6 w-full max-w-xs text-center shadow-2xl scale-in border border-white/10">
                <h3 class="text-lg font-bold text-white mb-4">관리자 로그인</h3>
                <input type="password" id="admin-pw-input" placeholder="비밀번호" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3.5 mb-4 text-center text-lg text-white focus:ring-2 focus:ring-[#3182F6] outline-none">
                <div class="flex gap-2">
                    <button id="admin-login-cancel" class="flex-1 bg-white/10 text-gray-300 font-bold py-3.5 rounded-xl active:scale-95 transition-transform">취소</button>
                    <button id="admin-login-submit" class="flex-1 bg-[#3182F6] text-white font-bold py-3.5 rounded-xl active:scale-95 transition-transform shadow-lg shadow-blue-500/20">로그인</button>
                </div>
            </div>
        </div>
        
        <!-- 관리자 수정 모달 -->
        <div id="admin-edit-modal" class="absolute inset-0 z-[95] bg-black/60 backdrop-blur-sm hidden flex items-center justify-center px-6">
            <div class="bg-[#1C1C1E] rounded-[24px] p-6 w-full max-w-sm shadow-2xl scale-in max-h-[90vh] overflow-y-auto border border-white/10">
                <h3 class="text-lg font-bold text-white mb-4 text-center">공지사항 수정</h3>
                <label class="block text-xs font-bold text-gray-400 mb-1.5">업데이트 내용</label>
                <textarea id="edit-update-content" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 mb-4 h-24 text-sm text-white resize-none focus:outline-none focus:ring-2 focus:ring-[#3182F6] leading-relaxed"></textarea>
                <label class="block text-xs font-bold text-gray-400 mb-1.5">신곡 안내</label>
                <textarea id="edit-new-song-content" class="w-full bg-blue-900/20 border border-blue-800/30 rounded-xl px-4 py-3 mb-6 h-24 text-sm text-white resize-none focus:outline-none focus:ring-2 focus:ring-[#3182F6] leading-relaxed"></textarea>
                <div class="flex gap-2">
                    <button id="admin-edit-cancel" class="flex-1 bg-white/10 text-gray-300 font-bold py-3.5 rounded-xl active:scale-95">취소</button>
                    <button id="admin-edit-save" class="flex-1 bg-[#3182F6] text-white font-bold py-3.5 rounded-xl active:scale-95 shadow-lg shadow-blue-500/20">저장</button>
                </div>
            </div>
        </div>

        <!-- 실시간 차트 전체 뷰 -->
        <div id="hourly-full-chart-view" class="absolute inset-0 z-[120] bg-black transform translate-x-full transition-transform duration-300 flex flex-col h-full">
            <div class="pt-safe px-5 pb-4 flex items-center gap-3 bg-black/80 backdrop-blur-xl sticky top-0 z-10 border-b border-white/[0.05]">
                <button id="btn-close-hourly-chart" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-white hover:bg-white/10 active:scale-95 transition-all">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
                <h2 class="text-[22px] font-black text-white tracking-tight">실시간 차트</h2>
            </div>
            <div id="hourly-full-chart-list" class="flex-1 overflow-y-auto px-0 pb-32 pt-2"></div>
        </div>

        <!-- 전체 인기 차트 뷰 -->
        <div id="full-chart-view" class="absolute inset-0 z-[120] bg-black transform translate-x-full transition-transform duration-300 flex flex-col h-full">
            <div class="pt-safe px-5 pb-4 flex items-center gap-3 bg-black/80 backdrop-blur-xl sticky top-0 z-10 border-b border-white/[0.05]">
                <button id="btn-close-chart" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-white hover:bg-white/10 active:scale-95 transition-all">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
                <h2 class="text-[22px] font-black text-white tracking-tight">인기 차트</h2>
            </div>
            <div id="full-chart-list" class="flex-1 overflow-y-auto px-0 pb-32 pt-2"></div>
        </div>

        <!-- 주간 차트 전체 뷰 -->
        <div id="weekly-full-chart-view" class="absolute inset-0 z-[120] bg-black transform translate-x-full transition-transform duration-300 flex flex-col h-full">
            <div class="pt-safe px-5 pb-4 flex items-center gap-3 bg-black/80 backdrop-blur-xl sticky top-0 z-10 border-b border-white/[0.05]">
                <button id="btn-close-weekly-chart" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-white hover:bg-white/10 active:scale-95 transition-all">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
                <h2 class="text-[22px] font-black text-white tracking-tight">주간 차트</h2>
            </div>
            <div id="weekly-full-chart-list" class="flex-1 overflow-y-auto px-0 pb-32 pt-2"></div>
        </div>

        <!-- 현재 재생목록 뷰 -->
        <div id="current-playlist-view" class="absolute inset-0 z-[120] bg-black transform translate-x-full transition-transform duration-300 flex flex-col h-full">
            <div class="pt-safe px-5 pb-4 flex items-center gap-3 bg-black/80 backdrop-blur-xl sticky top-0 z-10 border-b border-white/[0.05]">
                <button id="btn-close-playlist" class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center text-white hover:bg-white/10 active:scale-95 transition-all">
                    <i class="fa-solid fa-chevron-down text-lg"></i>
                </button>
                <h2 class="text-[22px] font-black text-white tracking-tight">현재 재생목록</h2>
            </div>
            <div id="current-playlist-list" class="flex-1 overflow-y-auto px-0 pb-32 pt-2"></div>
        </div>

        <!-- 1. 홈 화면 -->
        <div id="home-screen" class="relative z-10 h-full flex flex-col">
            
            <!-- 상단 앰비언트 라이트 효과 -->
            <div class="absolute top-0 left-0 right-0 h-[40vh] bg-gradient-to-b from-[#3182F6]/15 via-black/50 to-transparent pointer-events-none -z-10"></div>

            <button id="btn-admin-login" class="absolute top-safe right-4 w-10 h-10 z-50 opacity-0"></button>

            <!-- 스크롤 영역 -->
            <div class="flex-1 overflow-y-auto scrollbar-hide pb-32 pt-safe px-5 relative z-10">
                <div class="h-8"></div>

                <!-- New Album Section -->
                <div class="mb-12"> 
                    <div class="flex justify-between items-end mb-5 px-1">
                        <h2 class="text-[28px] font-black text-white tracking-tight leading-none">최신 음악<span class="text-[#3182F6]">.</span></h2>
                    </div>
                    <div class="flex gap-4 overflow-x-auto scrollbar-hide snap-x snap-mandatory px-1 pb-4" id="new-album-list"></div>
                </div>

                <!-- Unified Chart Section (Tabs) -->
                <div class="mb-12 relative">
                    <div class="flex items-end mb-4 px-1">
                        <!-- 탭 메뉴 -->
                        <div class="flex items-center gap-4 overflow-x-auto scrollbar-hide shrink-0 max-w-[70%]">
                            <button id="tab-hourly" class="text-[18px] font-black text-white tracking-tight leading-none transition-all whitespace-nowrap">실시간 차트<span class="text-[#3182F6] transition-opacity duration-300">.</span></button>
                            <button id="tab-realtime" class="text-[18px] font-black text-gray-600 tracking-tight leading-none transition-all hover:text-gray-400 whitespace-nowrap">인기 차트<span class="text-[#3182F6] opacity-0 hidden transition-opacity duration-300">.</span></button>
                            <button id="tab-weekly" class="text-[18px] font-black text-gray-600 tracking-tight leading-none transition-all hover:text-gray-400 whitespace-nowrap">주간 차트<span class="text-[#3182F6] opacity-0 hidden transition-opacity duration-300">.</span></button>
                        </div>
                    </div>
                    
                    <!-- 실시간 차트 헤더 우측 -->
                    <div id="header-hourly" class="flex flex-col gap-3 transition-all mb-4 px-1">
                        <span id="hourly-chart-time" class="absolute top-1 right-1 text-[11px] font-bold text-[#3182F6] tracking-wider uppercase">--시 기준</span>
                        <div class="flex items-center justify-start gap-2 w-full">
                            <button id="btn-shuffle-hourly" class="text-[11px] text-[#3182F6] font-bold bg-[#3182F6]/20 px-3.5 py-1.5 rounded-full active:scale-95 transition-all flex items-center justify-center gap-1.5 hover:bg-[#3182F6]/30">
                                <i class="fa-solid fa-shuffle text-[9px]"></i> AI 마음대로
                            </button>
                            <button id="btn-play-all-hourly" class="text-[11px] text-white font-bold bg-[#3182F6] px-3.5 py-1.5 rounded-full active:scale-95 transition-transform flex items-center justify-center gap-1.5 shadow-[0_4px_12px_rgba(49,130,246,0.3)] hover:bg-[#2563EB]">
                                <i class="fa-solid fa-play text-[9px]"></i> 전체 재생
                            </button>
                        </div>
                    </div>

                    <!-- 인기 차트 헤더 우측 -->
                    <div id="header-realtime" class="flex flex-col gap-3 hidden transition-all mb-4 px-1">
                        <span id="chart-time" class="absolute top-1 right-1 text-[11px] font-bold text-[#3182F6] tracking-wider uppercase">--월 --일 기준</span>
                        <div class="flex items-center justify-start gap-2 w-full">
                            <button id="btn-shuffle-realtime" class="text-[11px] text-[#3182F6] font-bold bg-[#3182F6]/20 px-3.5 py-1.5 rounded-full active:scale-95 transition-all flex items-center justify-center gap-1.5 hover:bg-[#3182F6]/30">
                                <i class="fa-solid fa-shuffle text-[9px]"></i> AI 마음대로
                            </button>
                            <button id="btn-play-all" class="text-[11px] text-white font-bold bg-[#3182F6] px-3.5 py-1.5 rounded-full active:scale-95 transition-transform flex items-center justify-center gap-1.5 shadow-[0_4px_12px_rgba(49,130,246,0.3)] hover:bg-[#2563EB]">
                                <i class="fa-solid fa-play text-[9px]"></i> 전체 재생
                            </button>
                        </div>
                    </div>
                    
                    <!-- 주간 차트 헤더 우측 -->
                    <div id="header-weekly" class="flex flex-col gap-3 hidden transition-all mb-4 px-1">
                        <span id="weekly-chart-time" class="absolute top-1 right-1 text-[11px] font-bold text-[#3182F6] tracking-wider uppercase">--월 --주차</span>
                        <div class="flex items-center justify-start gap-2 w-full">
                            <button id="btn-shuffle-weekly" class="text-[11px] text-[#3182F6] font-bold bg-[#3182F6]/20 px-3.5 py-1.5 rounded-full active:scale-95 transition-all flex items-center justify-center gap-1.5 hover:bg-[#3182F6]/30">
                                <i class="fa-solid fa-shuffle text-[9px]"></i> AI 마음대로
                            </button>
                            <button id="btn-play-all-weekly" class="text-[11px] text-white font-bold bg-[#3182F6] px-3.5 py-1.5 rounded-full active:scale-95 transition-transform flex items-center justify-center gap-1.5 shadow-[0_4px_12px_rgba(49,130,246,0.3)] hover:bg-[#2563EB]">
                                <i class="fa-solid fa-play text-[9px]"></i> 전체 재생
                            </button>
                        </div>
                    </div>

                    <!-- 실시간 차트 패널 -->
                    <div id="panel-hourly" class="block fade-in">
                        <div id="hourly-chart-slider" class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide gap-3 px-1 pb-2"></div>
                        <button id="btn-more-hourly-chart" class="w-full mt-4 py-3.5 text-[13px] text-white font-bold bg-white/[0.05] border border-white/[0.05] rounded-[18px] hover:bg-white/10 transition-colors">
                            실시간 차트 전체보기
                        </button>
                    </div>

                    <!-- 인기 차트 패널 -->
                    <div id="panel-realtime" class="hidden fade-in">
                        <div id="chart-slider" class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide gap-3 px-1 pb-2"></div>
                        <button id="btn-more-chart" class="w-full mt-4 py-3.5 text-[13px] text-white font-bold bg-white/[0.05] border border-white/[0.05] rounded-[18px] hover:bg-white/10 transition-colors">
                            인기 차트 전체보기
                        </button>
                    </div>

                    <!-- 주간 차트 패널 -->
                    <div id="panel-weekly" class="hidden fade-in">
                        <div id="weekly-chart-slider" class="flex overflow-x-auto snap-x snap-mandatory scrollbar-hide gap-3 px-1 pb-2"></div>
                        <button id="btn-more-weekly-chart" class="w-full mt-4 py-3.5 text-[13px] text-white font-bold bg-white/[0.05] border border-white/[0.05] rounded-[18px] hover:bg-white/10 transition-colors">
                            주간 차트 전체보기
                        </button>
                    </div>
                </div>

                <!-- Artists Section -->
                <div class="mb-12">
                    <h3 class="text-[22px] font-black text-white tracking-tight leading-none mb-5 px-1">아티스트<span class="text-[#3182F6]">.</span></h3>
                    <div class="flex gap-4 overflow-x-auto scrollbar-hide px-1 pb-2" id="artist-list"></div>
                </div>

                <!-- Coming Soon Section -->

        function updateChartTime() {
            const now = new Date();

        function getTodayId() {
            const now = new Date();
            return `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return { year: d.getUTCFullYear(), week: weekNo };
        }

        function getWeekId(date) {
            const info = getWeekNumber(date);
            return `${info.year}-W${info.week}`;
        }

        function updateWeeklyChartTime() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const weekOfMonth = Math.ceil((now.getDate() + firstDayOfMonth.getDay()) / 7);
            if (weeklyChartTime) weeklyChartTime.innerText = `${month}월 ${weekOfMonth}주차`;
            return getWeekId(now); 
        }

        function getPrevWeekId() {
            const now = new Date();
            const prevDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7);
            return getWeekId(prevDate);
        }

        function updateMediaSessionMetadata(song) {

                    const artworkSrc = getAbsoluteUrl(song.cover);

        function setupMediaSessionActionHandlers() {

                navigator.mediaSession.setActionHandler('previoustrack', () => {
                     let prevIdx = currentIdx - 1;
                     if (prevIdx < 0) prevIdx = currentPlaylist.length - 1;
                     openPlayer(prevIdx);
                });
                navigator.mediaSession.setActionHandler('nexttrack', () => {
                    let nextIdx;
                    if (isShuffle) {
                        nextIdx = Math.floor(Math.random() * currentPlaylist.length);
                        if (nextIdx === currentIdx && currentPlaylist.length > 1) nextIdx = (nextIdx + 1) % currentPlaylist.length;
                    } else {
                        nextIdx = currentIdx + 1;

                    }
                    openPlayer(nextIdx);
                });
            }

                    }
                }
            }, (err) => console.warn(err));

            // 실시간 차트 (Hourly) 상태 동기화
            const hourlySnapshotRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'config', 'hourly_chart_state');
            onSnapshot(hourlySnapshotRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();

                        hourlyChartData = data;
                        if (!hourlyChartData.rankChanges) hourlyChartData.rankChanges = {};
                        localStorage.setItem('hourly_chart_snapshot', JSON.stringify(hourlyChartData));
                        renderAll();
                    }
                }
            }, (err) => console.warn(err));

            // 인기 차트 데이터 리스너
            const statsRef = collection(db, 'artifacts', safeAppId, 'public', 'data', 'song_stats');
            unsubscribeSnapshot = onSnapshot(statsRef, (snapshot) => {
                const isCache = snapshot.metadata.fromCache;
                latestSongStats = {};
                snapshot.forEach(doc => { latestSongStats[doc.id] = doc.data().count || 0; });
                updateRankings(isCache);
            }, (error) => { console.warn("Snapshot error:", error); renderAll(); });
            
            // 주간 차트 데이터 리스너
            const weeklyStatsRef = collection(db, 'artifacts', safeAppId, 'public', 'data', 'weekly_stats');
            onSnapshot(weeklyStatsRef, (snapshot) => {
                latestWeeklyStats = {};
                snapshot.forEach(doc => { latestWeeklyStats[doc.id] = doc.data(); });
                renderWeeklyChart();
                renderFullWeeklyChartList(); 
            });

            // 실시간(Hourly) 차트 데일리 리셋 리스너
            const dailyStatsRef = collection(db, 'artifacts', safeAppId, 'public', 'data', 'daily_stats');
            onSnapshot(dailyStatsRef, (snapshot) => {
                const isCache = snapshot.metadata.fromCache;
                latestDailyStats = {};
                const todayId = getTodayId();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.dateId === todayId) {
                        latestDailyStats[doc.id] = data.count || 0;
                    } else {
                        latestDailyStats[doc.id] = 0;
                    }
                });
                updateHourlyRankings(isCache);
            });
        }

        // --- 새롭게 추가된 실시간 차트(Hourly) 산정 로직 ---
        function updateHourlyRankings(isCache = false) {
            const now = new Date();
            const todayId = getTodayId();
            const lastUpdateDate = new Date(hourlyChartData.lastUpdated || 0);
            
            const dayChanged = now.getFullYear() !== lastUpdateDate.getFullYear() || 
                               now.getMonth() !== lastUpdateDate.getMonth() || 
                               now.getDate() !== lastUpdateDate.getDate();
                               
            const needsUpdate = dayChanged || now.getHours() !== lastUpdateDate.getHours() || hourlyChartData.currentRanking.length === 0;
            
            if (needsUpdate) {
                if (isCache) return; 

                const tempSongs = [...songs];
                tempSongs.forEach(s => { s.hourlyCount = latestDailyStats[s.id] || 0; });
                
                // 순위 산정: 조회수가 같으면 (ex: 자정 리셋 시 0) 무조건 전 시간대 순위를 그대로 보존
                tempSongs.sort((a, b) => { 
                    if (b.hourlyCount !== a.hourlyCount) return b.hourlyCount - a.hourlyCount; 
                    const idxA = hourlyChartData.currentRanking.indexOf(a.id);
                    const idxB = hourlyChartData.currentRanking.indexOf(b.id);
                    const validA = idxA !== -1 ? idxA : 999;
                    const validB = idxB !== -1 ? idxB : 999;
                    if (validA !== validB) return validA - validB;
                    return a.id - b.id;
                });
                
                const newRankingIds = tempSongs.map(s => s.id);
                const newPlayCounts = {};
                tempSongs.forEach(s => newPlayCounts[s.id] = s.hourlyCount);

                if (!hourlyChartData.rankChanges) hourlyChartData.rankChanges = {};
                const newChanges = {};

                if (dayChanged) {
                    // 하루가 지나면 조회수 초기화 + 배지 리셋
                    newRankingIds.forEach(id => { newChanges[id] = '-'; });
                } else if (hourlyChartData.currentRanking.length > 0) {
                    const validOldRanking = hourlyChartData.currentRanking.filter(oldId => songs.some(s => s.id === oldId));
                    newRankingIds.forEach((id, newIndex) => {
                        const oldIndex = validOldRanking.indexOf(id);
                        const prevChange = hourlyChartData.rankChanges[id] || '-';

                        if (oldIndex === -1) newChanges[id] = 'new';
                        else if (newIndex < oldIndex) newChanges[id] = 'up';
                        else if (newIndex > oldIndex) newChanges[id] = 'down';
                        else newChanges[id] = prevChange; // 변동 없으면 배지 그대로 유지
                    });
                } else {
                    newRankingIds.forEach(id => { newChanges[id] = '-'; });
                }

                hourlyChartData.prevRanking = hourlyChartData.currentRanking;
                hourlyChartData.currentRanking = newRankingIds;
                hourlyChartData.playCounts = newPlayCounts;
                hourlyChartData.rankChanges = newChanges;
                hourlyChartData.lastUpdated = now.getTime();
                
                localStorage.setItem('hourly_chart_snapshot', JSON.stringify(hourlyChartData));
                
                if (auth && auth.currentUser) {
                    const safeAppId = appId || 'default-app-id';
                    const snapshotRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'config', 'hourly_chart_state');
                    setDoc(snapshotRef, hourlyChartData, { merge: true }).catch(e => console.warn(e));
                }
            }
            
            const updatedDate = new Date(hourlyChartData.lastUpdated || now);
            if(hourlyChartTime) hourlyChartTime.innerText = `${updatedDate.getHours()}시 기준`;
            
            renderAll();
        }

        // --- 기존 인기 차트 (Daily) 산정 로직 ---
        function updateRankings(isCache = false) {
            const now = new Date();
            const lastUpdateDate = new Date(chartData.lastUpdated || 0);
            
            const needsUpdate = now.getFullYear() !== lastUpdateDate.getFullYear() || 
                                now.getMonth() !== lastUpdateDate.getMonth() || 
                                now.getDate() !== lastUpdateDate.getDate() || 
                                chartData.currentRanking.length === 0;
            
            if (needsUpdate) {
                if (isCache) return; 
                
                const tempSongs = [...songs];
                tempSongs.forEach(s => { s.playCount = latestSongStats[s.id] || 0; });
                tempSongs.sort((a, b) => { if (b.playCount !== a.playCount) return b.playCount - a.playCount; return a.id - b.id; });
                const newRankingIds = tempSongs.map(s => s.id);
                const newPlayCounts = {};
                tempSongs.forEach(s => newPlayCounts[s.id] = s.playCount);
                
                if (!chartData.rankChanges) chartData.rankChanges = {};
                if (!chartData.rankChangeTimes) chartData.rankChangeTimes = {};
                const newChanges = {};
                const newChangeTimes = {};
                const ONE_WEEK = 7 * 24 * 3600 * 1000;
                
                if (chartData.currentRanking.length > 0) {
                    const validOldRanking = chartData.currentRanking.filter(oldId => songs.some(s => s.id === oldId));
                    
                    newRankingIds.forEach((id, newIndex) => {
                        const oldIndex = validOldRanking.indexOf(id);
                        const prevChange = chartData.rankChanges[id] || '-';
                        const prevTime = chartData.rankChangeTimes[id] || now.getTime();

                        if (oldIndex === -1) {
                            newChanges[id] = 'new';
                            newChangeTimes[id] = now.getTime();
                        }
                        else if (newIndex < oldIndex) {
                            newChanges[id] = 'up';
                            newChangeTimes[id] = now.getTime();
                        }
                        else if (newIndex > oldIndex) {
                            newChanges[id] = 'down';
                            newChangeTimes[id] = now.getTime();
                        }
                        else {
                            if (now.getTime() - prevTime >= ONE_WEEK) {
                                newChanges[id] = '-';
                                newChangeTimes[id] = now.getTime();
                            } else {
                                newChanges[id] = prevChange;
                                newChangeTimes[id] = prevTime;
                            }
                        }
                    });
                } else {
                    newRankingIds.forEach(id => {
                        newChanges[id] = '-';
                        newChangeTimes[id] = now.getTime();
                    });
                }

                chartData.prevRanking = chartData.currentRanking;
                chartData.currentRanking = newRankingIds;
                chartData.playCounts = newPlayCounts;
                chartData.rankChanges = newChanges;
                chartData.rankChangeTimes = newChangeTimes;
                chartData.lastUpdated = now.getTime();
                
                localStorage.setItem('chart_snapshot_v2', JSON.stringify(chartData));
                
                if (auth && auth.currentUser) {
                    const safeAppId = appId || 'default-app-id';
                    const snapshotRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'config', 'chart_state');
                    setDoc(snapshotRef, chartData, { merge: true }).catch(e => console.warn(e));
                }
            }
            const orderedSongs = [];
            chartData.currentRanking.forEach(id => { const song = songs.find(s => s.id === id); if (song) orderedSongs.push(song); });
            songs.forEach(s => { if (!chartData.currentRanking.includes(s.id)) orderedSongs.push(s); });
            songs = orderedSongs;
            const ONE_DAY = 24 * 3600 * 1000;
            songs.forEach((song, index) => {
                song.playCount = chartData.playCounts[song.id] || 0;
                const releaseTime = new Date(song.releaseDate).getTime();
                song.isNew = (Date.now() - releaseTime) < ONE_DAY;
                song.rankChange = chartData.rankChanges ? (chartData.rankChanges[song.id] || '-') : '-';
            });
            
            const updatedDate = new Date(chartData.lastUpdated || now);
            if(chartTime) chartTime.innerText = `${updatedDate.getMonth() + 1}월 ${updatedDate.getDate()}일 기준`;
            renderAll();
        }

        async function incrementPlayCount(songId) {
            if (!auth || !auth.currentUser) return;
            const safeAppId = appId || 'default-app-id';
            const currentWeekId = updateWeeklyChartTime();
            
            // 기존 조회수 통계 업데이트
            const docRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'song_stats', String(songId));
            const weeklyDocRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'weekly_stats', String(songId));
            // 새로운 실시간(Daily Reset) 통계 업데이트
            const dailyDocRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'daily_stats', String(songId));
            const todayId = getTodayId();

            try { 
                await setDoc(docRef, { count: increment(1) }, { merge: true }); 
                
                const weeklySnap = await getDoc(weeklyDocRef);
                if (weeklySnap.exists()) {
                    const data = weeklySnap.data();
                    if (data.thisWeekId === currentWeekId) { await updateDoc(weeklyDocRef, { thisWeekCount: increment(1) }); }
                    else { await setDoc(weeklyDocRef, { thisWeekId: currentWeekId, thisWeekCount: 1, lastWeekId: data.thisWeekId || "", lastWeekCount: data.thisWeekCount || 0 }, { merge: true }); }
                } else { await setDoc(weeklyDocRef, { thisWeekId: currentWeekId, thisWeekCount: 1, lastWeekId: "", lastWeekCount: 0 }); }

                const dailySnap = await getDoc(dailyDocRef);
                if (dailySnap.exists()) {
                    const data = dailySnap.data();
                    if (data.dateId === todayId) { await updateDoc(dailyDocRef, { count: increment(1) }); }
                    else { await setDoc(dailyDocRef, { dateId: todayId, count: 1 }, { merge: true }); }
                } else { await setDoc(dailyDocRef, { dateId: todayId, count: 1 }); }

            } catch (e) { console.error("Inc failed", e); }
        }

        async function fetchLrc(url) { try { const response = await fetch(url); if (!response.ok) return null; const text = await response.text(); return parseLrc(text); } catch (e) { return null; } }

        function parseLrc(lrcText) {
            const lines = lrcText.split('\n');
            const result = [];
            const timeReg = /\[(\d{2}):(\d{2})[.:](\d{2,3})\]/;
            lines.forEach(line => {
                const match = timeReg.exec(line);
                if (match) {
                    const min = parseInt(match[1]);
                    const sec = parseInt(match[2]);
                    let ms = parseInt(match[3]);
                    if (match[3].length === 3) ms = ms / 10;
                    const time = min * 60 + sec + ms / 100;
                    const text = line.replace(timeReg, '').trim();
                    if (text) result.push({ time, text });
                }
            });
            return result;
        }

        function scrollToActiveLyricImmediate() {
            if (!isLyricsOpen || currentLyrics.length === 0) return;
            const currentTime = audio.currentTime;
            let activeIdx = -1;
            for (let i = 0; i < currentLyrics.length; i++) { if (currentTime >= currentLyrics[i].time) activeIdx = i; else break; }
            if (activeIdx === -1) activeIdx = 0; 
            const lines = lyricsContent.getElementsByClassName('lyric-line');
            if (lines[activeIdx]) {
                const offset = lines[activeIdx].offsetTop - (lyricsContent.clientHeight * 0.2);
                lyricsContent.scrollTo({ top: offset, behavior: 'auto' });
                for (let i = 0; i < lines.length; i++) { if (i === activeIdx) lines[i].classList.add('active'); else lines[i].classList.remove('active'); }
            }
        }

        function syncLyrics() {
            if (!isLyricsOpen || currentLyrics.length === 0) return;
            const currentTime = audio.currentTime;
            let activeIdx = -1;
            for (let i = 0; i < currentLyrics.length; i++) { if (currentTime >= currentLyrics[i].time) activeIdx = i; else break; }
            const lines = lyricsContent.getElementsByClassName('lyric-line');
            for (let i = 0; i < lines.length; i++) {
                if (i === activeIdx) {
                    if (!lines[i].classList.contains('active')) {
                        lines[i].classList.add('active');
                        const offset = lines[i].offsetTop - (lyricsContent.clientHeight * 0.2);
                        lyricsContent.scrollTo({ top: offset, behavior: 'smooth' });
                    }
                } else lines[i].classList.remove('active');
            }
        }
        
        function animateLyrics() { if (isLyricsOpen && !audio.paused) { syncLyrics(); rafId = requestAnimationFrame(animateLyrics); } }
        function startLyricsSync() { if (rafId) cancelAnimationFrame(rafId); animateLyrics(); }
        function stopLyricsSync() { if (rafId) cancelAnimationFrame(rafId); rafId = null; }

            });
            
            if (!currentPlaylist[index]) return;
            const songToPlay = currentPlaylist[index];
            
            if (audio.dataset.songId == songToPlay.id && !audio.paused && playerScreen.classList.contains('translate-y-full')) {
                currentIdx = index;
                playerScreen.classList.remove('translate-y-full'); 
                return; 
            }
            
            incrementPlayCount(songToPlay.id);
            currentIdx = index;
            loadSongData(index);
            playerScreen.classList.remove('translate-y-full');
            togglePlay(true);
        };

        const togglePlay = (forcePlay = null) => {
            const shouldPlay = forcePlay === null ? audio.paused : forcePlay;
            if (shouldPlay) { audio.play().then(() => updateUI(true)).catch(e => { console.error(e); errorBox.classList.remove('hidden'); updateUI(false); }); }
            else { audio.pause(); updateUI(false); }
        };

        const updateUI = (playing) => {
            isPlaying = playing;
            if (playing) { miniIconPlay.classList.add('hidden'); miniIconPause.classList.remove('hidden'); iconPlay.classList.add('hidden'); iconPause.classList.remove('hidden'); if('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing"; startLyricsSync(); }
            else { miniIconPlay.classList.remove('hidden'); miniIconPause.classList.add('hidden'); iconPlay.classList.remove('hidden'); iconPause.classList.add('hidden'); if('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused"; stopLyricsSync(); }
        };

        miniPlayer.addEventListener('click', () => { playerScreen.classList.remove('translate-y-full'); });
        
        const closePlayerScreen = () => { 
            playerScreen.classList.add('translate-y-full'); 
            isPlayerVisible = false; 
            updatePillState(); 
        };
        
        document.getElementById('btn-minimize').onclick = closePlayerScreen;
        
        let swipeStartY = 0;
        let isSwiping = false;

        const onSwipeStart = (e) => { 
            if (e.target.tagName.toLowerCase() === 'input') return; 
            isSwiping = true;
            swipeStartY = e.type.includes('touch') ? e.touches[0].screenY : e.clientY; 
        };
        
        const onSwipeEnd = (e) => {
            if (!isSwiping) return;
            isSwiping = false;
            const endY = e.type.includes('touch') ? e.changedTouches[0].screenY : e.clientY;
            if (endY - swipeStartY > 40 && isPlayerVisible) { 
                closePlayerScreen();
            }
        };

        playerScreen.addEventListener('touchstart', onSwipeStart, {passive: true});
        playerScreen.addEventListener('touchend', onSwipeEnd, {passive: true});
        playerScreen.addEventListener('mousedown', onSwipeStart);
        playerScreen.addEventListener('mouseup', onSwipeEnd);
        playerScreen.addEventListener('mouseleave', (e) => {
            if (isSwiping) onSwipeEnd(e);
        });

        btnPlay.addEventListener('click', () => togglePlay());
        miniPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        document.getElementById('btn-next').addEventListener('click', () => { 
            let nextIdx;
            if (isShuffle) {
                nextIdx = Math.floor(Math.random() * currentPlaylist.length);
                if (nextIdx === currentIdx && currentPlaylist.length > 1) nextIdx = (nextIdx + 1) % currentPlaylist.length;
            } else {
                nextIdx = currentIdx + 1;
                if (nextIdx >= currentPlaylist.length) nextIdx = 0;
            }
            openPlayer(nextIdx); 
        });
        document.getElementById('btn-prev').addEventListener('click', () => { let prevIdx = currentIdx - 1; if (prevIdx < 0) prevIdx = currentPlaylist.length - 1; openPlayer(prevIdx); });

        audio.addEventListener('ended', () => { 
            if (isRepeat) { 
                audio.currentTime = 0; audio.play(); 
            } else { 
                if (isShuffle) {
                    let nextIdx = Math.floor(Math.random() * currentPlaylist.length);
                    if (nextIdx === currentIdx && currentPlaylist.length > 1) nextIdx = (nextIdx + 1) % currentPlaylist.length;
                    openPlayer(nextIdx);
                } else {
                    let nextIdx = currentIdx + 1; 
                    if (nextIdx < currentPlaylist.length) openPlayer(nextIdx); 
                    else { togglePlay(false); audio.currentTime = 0; } 
                }
            } 
        });

        // 실시간 차트 전체보기
        btnMoreHourlyChart.onclick = () => hourlyFullChartView.classList.remove('translate-x-full');
        btnCloseHourlyChart.onclick = () => hourlyFullChartView.classList.add('translate-x-full');
        
        btnMoreChart.onclick = () => fullChartView.classList.remove('translate-x-full');
        btnCloseChart.onclick = () => fullChartView.classList.add('translate-x-full');
        
        if(btnMoreWeeklyChart) btnMoreWeeklyChart.onclick = () => weeklyFullChartView.classList.remove('translate-x-full');
        if(btnCloseWeeklyChart) btnCloseWeeklyChart.onclick = () => weeklyFullChartView.classList.add('translate-x-full');
        
        btnPlayAll.onclick = () => { isShuffle = false; openPlayer(0, songs); };
        
        if(btnPlayAllHourly) {
            btnPlayAllHourly.onclick = () => {
                isShuffle = false;
                let orderedSongs = [];
                hourlyChartData.currentRanking.forEach(id => { const song = songs.find(s => s.id === id); if (song) orderedSongs.push(song); });
                songs.forEach(s => { if (!hourlyChartData.currentRanking.includes(s.id)) orderedSongs.push(s); });
                if(orderedSongs.length > 0) {
                    openPlayer(0, orderedSongs);
                }
            };
        }

        if(btnPlayAllWeekly) {
            btnPlayAllWeekly.onclick = () => {
                isShuffle = false;
                const targetPrevWeekId = getPrevWeekId(); 
                let weeklySongs = [...songs].map(s => {
                    const data = latestWeeklyStats[s.id] || {};
                    let displayCount = 0;
                    if (data.lastWeekId === targetPrevWeekId) { displayCount = data.lastWeekCount || 0; }
                    else if (data.thisWeekId === targetPrevWeekId) { displayCount = data.thisWeekCount || 0; }
                    return { ...s, weeklyCount: displayCount };
                });
                weeklySongs.sort((a, b) => { if (a.isNew && !b.isNew) return -1; if (!a.isNew && b.isNew) return 1; return b.weeklyCount - a.weeklyCount; });
                if(weeklySongs.length > 0) {
                    openPlayer(0, weeklySongs);
                }
            };
        }

        const startAIPlay = (list) => {
            isShuffle = true;
            let randomIdx = Math.floor(Math.random() * list.length);
            openPlayer(randomIdx, list);
        };

        if(btnShuffleHourly) btnShuffleHourly.onclick = () => {
            let orderedSongs = [];
            hourlyChartData.currentRanking.forEach(id => { const song = songs.find(s => s.id === id); if (song) orderedSongs.push(song); });
            songs.forEach(s => { if (!hourlyChartData.currentRanking.includes(s.id)) orderedSongs.push(s); });
            startAIPlay(orderedSongs);
        };
        if(btnShuffleRealtime) btnShuffleRealtime.onclick = () => startAIPlay(songs);
        if(btnShuffleWeekly) btnShuffleWeekly.onclick = () => {
            const targetPrevWeekId = getPrevWeekId(); 
            let weeklySongs = [...songs].map(s => {
                const data = latestWeeklyStats[s.id] || {};
                let displayCount = 0;
                if (data.lastWeekId === targetPrevWeekId) { displayCount = data.lastWeekCount || 0; }
                else if (data.thisWeekId === targetPrevWeekId) { displayCount = data.thisWeekCount || 0; }
                return { ...s, weeklyCount: displayCount };
            });
            weeklySongs.sort((a, b) => { if (a.isNew && !b.isNew) return -1; if (!a.isNew && b.isNew) return 1; return b.weeklyCount - a.weeklyCount; });
            startAIPlay(weeklySongs);
        };

        // 탭 메뉴 컨트롤 로직 (실시간/인기/주간)
        if(tabHourly && tabRealtime && tabWeekly) {
            const tabs = [
                { tab: tabHourly, header: headerHourly, panel: panelHourly },
                { tab: tabRealtime, header: headerRealtime, panel: panelRealtime },
                { tab: tabWeekly, header: headerWeekly, panel: panelWeekly }
            ];

            tabs.forEach((item) => {
                item.tab.onclick = () => {
                    tabs.forEach(t => {
                        t.tab.classList.replace('text-white', 'text-gray-600');
                        t.tab.querySelector('span').classList.add('opacity-0', 'hidden');
                        t.header.classList.add('hidden');
                        t.panel.classList.replace('block', 'hidden');
                    });
                    item.tab.classList.replace('text-gray-600', 'text-white');
                    item.tab.querySelector('span').classList.remove('opacity-0', 'hidden');
                    item.header.classList.remove('hidden');
                    item.panel.classList.replace('hidden', 'block');
                };
            });
        }

        function getClientX(e) { return e.touches ? e.touches[0].clientX : e.clientX; }
        function onScrub(e) {
            const rect = document.getElementById('progress-container').getBoundingClientRect();
            return Math.max(0, Math.min(100, ((getClientX(e) - rect.left) / rect.width) * 100));
        }
        const startScrub = (e) => { isDragging = true; progressFill.style.width = `${onScrub(e)}%`; };
        const moveScrub = (e) => { if (isDragging) { e.preventDefault(); progressFill.style.width = `${onScrub(e)}%`; } };
        const endScrub = (e) => { if (isDragging) { isDragging = false; if(audio.duration) audio.currentTime = (parseFloat(progressFill.style.width) / 100) * audio.duration; } };
        const pContainer = document.getElementById('progress-container');
        pContainer.addEventListener('mousedown', startScrub);
        pContainer.addEventListener('touchstart', startScrub, {passive: false});
        document.addEventListener('mousemove', moveScrub);
        document.addEventListener('touchmove', moveScrub, {passive: false});
        document.addEventListener('mouseup', endScrub);
        document.addEventListener('touchend', endScrub);

        function formatTime(s) { if (typeof s !== 'number' || isNaN(s) || !isFinite(s)) return "00:00"; const min = Math.floor(s / 60); const sec = Math.floor(s % 60); return `${min}:${sec < 10 ? '0'+sec : sec}`; }

        function updateTimeDisplay() {
            if (timeCurr) timeCurr.innerText = formatTime(audio.currentTime);
            if (timeDur && audio.duration) timeDur.innerText = formatTime(audio.duration);
            if (!isDragging && audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                if(progressFill) progressFill.style.width = `${percent}%`;
                if(progressHandle) progressHandle.style.left = `${percent}%`;
                if(seekSlider) seekSlider.value = percent;
                const miniProg = document.getElementById('mini-progress');
                if(miniProg) miniProg.style.width = `${percent}%`;
            }
        }
        audio.addEventListener('timeupdate', updateTimeDisplay);
        audio.addEventListener('loadedmetadata', updateTimeDisplay);
        audio.addEventListener('durationchange', updateTimeDisplay);

        if (btnClosePlaylist) {
            btnClosePlaylist.addEventListener('click', () => {
                currentPlaylistView.classList.add('translate-x-full');
            });
        }

        function renderCurrentPlaylist() {
            const listEl = document.getElementById('current-playlist-list');
            if(!listEl) return;
            listEl.innerHTML = '';
            currentPlaylist.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 px-5 py-3 hover:bg-white/[0.04] active:bg-white/[0.06] transition-all cursor-pointer group";
                div.innerHTML = `
                    <div class="w-[52px] h-[52px] rounded-[16px] bg-gray-900 overflow-hidden relative flex-shrink-0 shadow-md border ${index === currentIdx ? 'border-[#3182F6]' : 'border-white/10'} transition-all">
                        <img src="${song.cover}" class="w-full h-full object-cover ${index === currentIdx ? 'opacity-80' : ''}">
                        ${index === currentIdx ? '<div class="absolute inset-0 flex items-center justify-center bg-black/40"><i class="fa-solid fa-volume-high text-[#3182F6] text-xs"></i></div>' : ''}
                    </div>
                    <div class="flex-1 min-w-0 pr-2 flex flex-col justify-center">
                        <h3 class="text-[15px] font-bold ${index === currentIdx ? 'text-[#3182F6]' : 'text-white'} truncate mb-0.5 transition-colors">${song.title}</h3>
                        <p class="text-[12px] text-gray-400 truncate font-medium">${song.artist}</p>
                    </div>
                `;
                div.addEventListener('click', () => {
                    openPlayer(index);
                    currentPlaylistView.classList.add('translate-x-full');
                });
                listEl.appendChild(div);
            });
        }

        if (btnPlaylist) {
            btnPlaylist.addEventListener('click', () => {
                renderCurrentPlaylist();
                currentPlaylistView.classList.remove('translate-x-full');
            });
        }

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) { setupRealtimeListener(); setupNoticeListener(); } 
                else { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) signInWithCustomToken(auth, __initial_auth_token); else signInAnonymously(auth); }
            });
        } else renderAll();
    </script>
</body>
</html>
